<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 4 | Em construção</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: #f0faf5;
        color: #1a2e22;
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      :root {
        --green: #2d9e6b;
        --green-dark: #1a6845;
        --border: #c8e8d5;
        --muted: #5a7a65;
      }
      .construction-box {
        text-align: center;
        padding: 60px 30px;
        background: white;
        border-radius: 32px;
        border: 2px dashed var(--border);
        max-width: 500px;
        margin: 40px auto;
      }
      .construction-icon {
        font-size: 80px;
        margin-bottom: 20px;
      }
      .construction-box h2 {
        font-size: 32px;
        color: var(--green-dark);
        margin-bottom: 16px;
      }
      .construction-box p {
        color: var(--muted);
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="construction-box">
      <div class="construction-icon">🚧</div>
      <h2>AULA 4 – EM CONSTRUÇÃO</h2>
      <p>
        Conteúdo programado: <strong>Passive Voice</strong> e
        <strong>Reported Speech</strong>.<br />Volte em breve para mais
        revisões!
      </p>
    </div>
  </body>
</html>
